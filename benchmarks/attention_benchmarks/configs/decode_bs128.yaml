# FA4 page_size sweep: find which block_size hits the TMA path on SM100/Blackwell.
# paged_kv_non_tma=True for block_size ∉ {128} → non-TMA (slow batch scaling)
# paged_kv_non_tma=False for block_size=128    → TMA (expected better scaling)
model:
  num_layers: 4
  num_q_heads: 40
  num_kv_heads: 8
  head_dim: 128
  block_size: 16

backends:
  - FLASH_ATTN

model_parameter_sweep:
  param_name: block_size
  values: [16, 32, 64, 128]
  label_format: "{backend}_bs{value}"

batch_specs:
  # Pure decode (q_len=1)
  - "1q1s60000"
  - "2q1s60000"
  - "3q1s60000"
  - "4q1s60000"
  - "6q1s60000"
  - "8q1s60000"
  - "12q1s60000"
  - "16q1s60000"
  - "24q1s60000"
  - "32q1s60000"
  - "64q1s60000"
  - "128q1s60000"
  # Speculative decode (q_len=4)
  - "1q4s60000"
  - "2q4s60000"
  - "3q4s60000"
  - "4q4s60000"
  - "6q4s60000"
  - "8q4s60000"
  - "12q4s60000"
  - "16q4s60000"
  - "24q4s60000"
  - "32q4s60000"
  - "64q4s60000"
  - "128q4s60000"

device: "cuda:0"
repeats: 20
warmup_iters: 10

output:
  csv: "results_vllm_decode_bs128.csv"
