model:
  num_layers: 4
  num_q_heads: 40
  num_kv_heads: 8
  head_dim: 128
  block_size: 16

backends:
  - FLASH_ATTN
  - FLASHINFER  # On SM100/Blackwell, FLASHINFER auto-selects TRTLLM-MHA kernels

batch_specs:
  - "q1k"      # 1024 tokens
  - "q2k"      # 2048 tokens
  - "q4k"      # 4096 tokens
  - "q8k"      # 8192 tokens
  - "q16k"     # 16384 tokens
  - "q32k"     # 32768 tokens
  - "q60000"   # 60000 tokens

device: "cuda:0"
repeats: 20
warmup_iters: 10

output:
  csv: "results_vllm_prefill_sweep.csv"
